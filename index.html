            document.getElementById('skills-grid').innerHTML = data.skills.blocks.map((block, index) => `
                <div class="glass-card p-7 rounded-3xl relative overflow-hidden flex flex-col min-h-[220px] reveal reveal-delay-${index % 3 + 1} transition-all duration-300 hover:-translate-y-1 hover:border-${block.theme}-500/30 hover:shadow-[0_15px_30px_-10px_rgba(var(--tw-colors-${block.theme}-500),0.15)] group cursor-default">
                    <div class="flex flex-col gap-4 relative z-10 h-full">
                        <div class="w-12 h-12 rounded-2xl bg-${block.theme}-500/10 flex items-center justify-center border border-${block.theme}-500/20 text-${block.theme}-400 mb-2 transition-transform duration-300 group-hover:scale-110 group-hover:bg-${block.theme}-500/20">
                            <i data-lucide="${block.icon}" class="w-6 h-6"></i>
                        </div>
                        <h3 class="text-xl font-black text-white tracking-wide">${block.title}</h3>
                        <div class="flex flex-wrap gap-2 mt-auto pt-4 border-t border-white/5 transition-colors duration-300 group-hover:border-${block.theme}-500/30">
                            ${block.items.map(i => `
                                <span class="px-3 py-1.5 rounded-lg bg-[#0a0a0f] text-slate-300 text-xs font-medium border border-white/5 flex items-center gap-2">
                                    ${i.name} ${i.level ? `<span class="bg-${block.theme}-500/20 text-${block.theme}-300 px-1.5 py-0.5 rounded text-[10px] uppercase font-bold">${i.level}</span>` : ''}
                                </span>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `).join('');
            
            const edTheme = data.skills.education.theme || 'blue';
            document.getElementById('skills-grid').innerHTML += `
                <div class="glass-card p-7 rounded-3xl relative overflow-hidden flex flex-col min-h-[220px] reveal reveal-delay-3 transition-all duration-300 hover:-translate-y-1 hover:border-${edTheme}-500/30 hover:shadow-[0_15px_30px_-10px_rgba(var(--tw-colors-${edTheme}-500),0.15)] group cursor-default">
                    <div class="flex flex-col relative z-10 h-full">
                        <div class="w-12 h-12 rounded-2xl bg-${edTheme}-500/10 flex items-center justify-center border border-${edTheme}-500/20 text-${edTheme}-400 mb-6 transition-transform duration-300 group-hover:scale-110 group-hover:bg-${edTheme}-500/20">
                            <i data-lucide="graduation-cap" class="w-6 h-6"></i>
                        </div>
                        <h3 class="text-xl font-black text-white tracking-wide mb-auto">EDUCATION</h3>
                        <div class="mt-4 pt-4 border-t border-white/5 flex flex-col gap-1 transition-colors duration-300 group-hover:border-${edTheme}-500/30">
                            <h4 class="text-lg font-bold text-white tracking-wide">${data.skills.education.school}</h4>
                            <p class="text-slate-400 font-medium text-sm mb-1">${data.skills.education.major}</p>
                            <p class="text-slate-600 text-[11px] font-mono tracking-wider">${data.skills.education.time}</p>
                        </div>
                    </div>
                </div>
            `;

            // Footer
            document.getElementById('footer-logo').innerHTML = `<span class="text-white">${data.global.logoStart}</span><span class="logo-gradient font-black">${data.global.logoEnd}</span>`;
            document.getElementById('footer-thankyou').innerText = data.footer.thankYouText;
            document.getElementById('footer-copyright').innerHTML = data.footer.copyright;
            document.getElementById('footer-links').innerHTML = `
                <a href="mailto:${data.footer.email}" class="interactive-element w-14 h-14 flex items-center justify-center rounded-full bg-[#111118] border border-white/10 hover:border-indigo-400 hover:text-indigo-400 hover:shadow-[0_0_15px_rgba(129,140,248,0.3)] hover:-translate-y-1 transition-all duration-300 text-slate-400 shadow-lg">
                    <i data-lucide="mail" class="w-6 h-6"></i>
                </a>
                <a href="${data.footer.socialLink}" target="_blank" class="interactive-element w-14 h-14 flex items-center justify-center rounded-full bg-[#111118] border border-white/10 hover:border-purple-400 hover:text-purple-400 hover:shadow-[0_0_15px_rgba(192,132,252,0.3)] hover:-translate-y-1 transition-all duration-300 text-slate-400 shadow-lg">
                    <i data-lucide="fingerprint" class="w-6 h-6"></i>
                </a>
            `;

            if (typeof lucide !== 'undefined') lucide.createIcons();
        }

        // ==========================================
        // 超清交互查看器引擎 
        // ==========================================
        window.currentLightboxImages = [];
        window.currentLightboxIndex = 0;
        
        let lbScale = 1, lbPanX = 0, lbPanY = 0, isLbDragging = false, lbStartX, lbStartY;

        window.openLightbox = function(imageUrls, startIndex = 0) {
            window.currentLightboxImages = imageUrls;
            window.currentLightboxIndex = startIndex;
            const lightbox = document.getElementById('image-lightbox');
            lightbox.classList.remove('hidden'); 
            document.body.style.overflow = 'hidden'; 
            renderLightboxContent();
            setTimeout(() => { lightbox.classList.remove('opacity-0'); }, 10);
        }

        window.renderLightboxContent = function() {
            const images = window.currentLightboxImages;
            const idx = window.currentLightboxIndex;
            const imgEl = document.getElementById('lightbox-img');
            imgEl.src = images[idx];
            resetLightboxZoom();
            
            const counter = document.getElementById('lightbox-counter');
            if (images.length > 1) {
                counter.style.display = 'flex';
                counter.innerHTML = `
                    <span class="cursor-pointer hover:text-white/50 px-2 interactive-element" onclick="navigateLightbox(-1, event)"><i data-lucide="chevron-left" class="w-4 h-4"></i></span>
                    ${idx + 1} / ${images.length}
                    <span class="cursor-pointer hover:text-white/50 px-2 interactive-element" onclick="navigateLightbox(1, event)"><i data-lucide="chevron-right" class="w-4 h-4"></i></span>
                `;
            } else {
                counter.style.display = 'none';
            }
            
            document.getElementById('lightbox-prev').style.display = images.length > 1 ? 'block' : 'none';
            document.getElementById('lightbox-next').style.display = images.length > 1 ? 'block' : 'none';
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }

        window.navigateLightbox = function(dir, event) {
            if(event) event.stopPropagation();
            const len = window.currentLightboxImages.length;
            window.currentLightboxIndex = (window.currentLightboxIndex + dir + len) % len;
            renderLightboxContent();
        }

        window.closeLightboxFn = function() {
            const lightbox = document.getElementById('image-lightbox');
            lightbox.classList.add('opacity-0'); 
            document.body.style.overflow = ''; 
            setTimeout(() => { lightbox.classList.add('hidden'); }, 300); 
        };

        function updateLightboxTransform(instant = false) {
            const img = document.getElementById('lightbox-img');
            if (img) {
                img.style.transition = instant ? 'none' : 'transform 0.15s cubic-bezier(0.2, 0.8, 0.2, 1)';
                img.style.transform = `translate(${lbPanX}px, ${lbPanY}px) scale(${lbScale})`;
            }
        }

        function resetLightboxZoom() {
            lbScale = 1; lbPanX = 0; lbPanY = 0;
            updateLightboxTransform();
        }

        function initZoomPan() {
            const wrapper = document.getElementById('lightbox-zoom-wrapper');
            const lightbox = document.getElementById('image-lightbox');
            if(!wrapper) return;

            wrapper.addEventListener('wheel', (e) => {
                if(lightbox.classList.contains('hidden')) return;
                e.preventDefault(); 
                const zoomIntensity = 0.15; 
                const delta = e.deltaY > 0 ? -1 : 1; 
                const newScale = lbScale + (delta * zoomIntensity);
                lbScale = Math.max(0.5, Math.min(newScale, 5)); 
                updateLightboxTransform();
            }, {passive: false});

            wrapper.addEventListener('mousedown', (e) => {
                if (e.target.closest('button') || e.target.closest('#lightbox-counter')) return; 
                isLbDragging = true;
                lbStartX = e.clientX - lbPanX;
                lbStartY = e.clientY - lbPanY;
                wrapper.classList.remove('cursor-grab');
                wrapper.classList.add('cursor-grabbing');
            });

            window.addEventListener('mousemove', (e) => {
                if(!isLbDragging) return;
                lbPanX = e.clientX - lbStartX;
                lbPanY = e.clientY - lbStartY;
                updateLightboxTransform(true); 
            });

            window.addEventListener('mouseup', () => {
                isLbDragging = false;
                wrapper.classList.add('cursor-grab');
                wrapper.classList.remove('cursor-grabbing');
            });

            wrapper.addEventListener('click', (e) => {
                if (Math.abs(lbPanX - (e.clientX - lbStartX)) < 5 && Math.abs(lbPanY - (e.clientY - lbStartY)) < 5) {
                    if (e.target === wrapper) closeLightboxFn();
                }
            });

            window.addEventListener('keydown', (e) => {
                if (!lightbox.classList.contains('hidden')) {
                    if (e.key === 'Escape') closeLightboxFn();
                    else if (e.key === 'ArrowLeft') navigateLightbox(-1);
                    else if (e.key === 'ArrowRight') navigateLightbox(1);
                    else if (e.key === '0') resetLightboxZoom(); 
                }
            });
        }

        // ==========================================
        // 视频播放器逻辑
        // ==========================================
        window.isVideoExpanded = false;
        window.toggleShowreel = function(e) {
            if(e) e.stopPropagation(); 
            const wrapper = document.getElementById('showreel-wrapper');
            const video = document.getElementById('showreel-video');
            const overlay = document.getElementById('showreel-overlay');
            const backdrop = document.getElementById('showreel-backdrop');
            const closeBtn = document.getElementById('showreel-close-btn');

            if (!window.isVideoExpanded) {
                window.isVideoExpanded = true;
                document.body.style.overflow = 'hidden'; 
                const rect = wrapper.getBoundingClientRect();
                const placeholder = document.createElement('div');
                placeholder.id = 'showreel-placeholder';
                placeholder.className = 'w-full aspect-video relative z-0';
                wrapper.parentNode.insertBefore(placeholder, wrapper);
                
                // 将 wrapper 移动到 document.body
                // 注意：在 HTML5 规范中，移动 DOM 节点中的 video 元素会导致其播放状态被重置。
                document.body.appendChild(wrapper);

                wrapper.classList.remove('relative', 'w-full', 'z-10', 'group');
                wrapper.classList.add('fixed', 'z-[100]', 'shadow-[0_20px_60px_rgba(0,0,0,0.8)]', 'border-white/10');
                wrapper.style.transition = 'none'; wrapper.style.margin = '0'; wrapper.style.transform = 'none'; 
                wrapper.style.left = rect.left + 'px'; wrapper.style.top = rect.top + 'px';
                wrapper.style.width = rect.width + 'px'; wrapper.style.height = rect.height + 'px';
                wrapper.offsetHeight; // 强制触发重绘

                requestAnimationFrame(() => {
                    wrapper.style.transition = 'all 0.8s cubic-bezier(0.16, 1, 0.3, 1)';
                    const targetWidth = window.innerWidth > 768 ? window.innerWidth * 0.8 : window.innerWidth * 0.95;
                    const finalWidth = Math.min(targetWidth, 1200); const finalHeight = finalWidth * 9 / 16; 
                    const targetLeft = (window.innerWidth - finalWidth) / 2; const targetTop = (window.innerHeight - finalHeight) / 2;
                    wrapper.style.left = targetLeft + 'px'; wrapper.style.top = targetTop + 'px';
                    wrapper.style.width = finalWidth + 'px'; wrapper.style.height = finalHeight + 'px';

                    // 优化：给浏览器一点点时间处理刚才的 DOM Append，重新挂载完毕后再执行 play()
                    // 如果不加这个延迟，由于 DOM 节点还在被浏览器重新接管，video.play() 的指令极易被吞噬导致视频停顿。
                    setTimeout(() => {
                        video.setAttribute('controls', 'true');
                        video.muted = false;
                        const playPromise = video.play();
                        if (playPromise !== undefined) {
                            playPromise.catch(err => {
                                console.warn('浏览器策略阻止了带声音的自动播放，将降级为静音自动播放', err);
                                video.muted = true;
                                video.play();
                            });
                        }
                    }, 100);
                });

                backdrop.classList.remove('opacity-0', 'pointer-events-none'); backdrop.classList.add('opacity-100', 'pointer-events-auto');
                closeBtn.classList.remove('opacity-0', 'pointer-events-none'); closeBtn.classList.add('opacity-100', 'pointer-events-auto');
                overlay.classList.add('opacity-0', 'pointer-events-none');
                video.classList.remove('group-hover:scale-105', 'object-cover'); 
                video.classList.add('object-contain', 'bg-black');
                
            } else {
                window.isVideoExpanded = false;
                document.body.style.overflow = ''; 
                const placeholder = document.getElementById('showreel-placeholder');
                if (placeholder) {
                    const rect = placeholder.getBoundingClientRect();
                    wrapper.style.transition = 'all 0.8s cubic-bezier(0.16, 1, 0.3, 1)';
                    wrapper.style.left = rect.left + 'px'; wrapper.style.top = rect.top + 'px';
                    wrapper.style.width = rect.width + 'px'; wrapper.style.height = rect.height + 'px';
                }
                backdrop.classList.add('opacity-0', 'pointer-events-none'); backdrop.classList.remove('opacity-100', 'pointer-events-auto');
                closeBtn.classList.add('opacity-0', 'pointer-events-none'); closeBtn.classList.remove('opacity-100', 'pointer-events-auto');
                overlay.classList.remove('opacity-0', 'pointer-events-none');
                video.classList.add('group-hover:scale-105', 'object-cover'); 
                video.classList.remove('object-contain', 'bg-black');
                
                // 缩小后关闭声音并暂停
                video.muted = true;
                video.removeAttribute('controls');
                video.pause();

                setTimeout(() => {
                    if (!window.isVideoExpanded) {
                        wrapper.style = ''; wrapper.classList.remove('fixed', 'z-[100]', 'shadow-[0_20px_60px_rgba(0,0,0,0.8)]', 'border-white/10');
                        wrapper.classList.add('relative', 'w-full', 'z-10', 'group');
                        if (placeholder) { placeholder.parentNode.insertBefore(wrapper, placeholder); placeholder.remove(); }
                    }
                }, 800);
            }
        };

        // ==========================================
        // 轮播图核心
        // ==========================================
        let cIdx = 0, cTimer;
        function initCarouselDOM() {
            const stage = document.getElementById('carousel-stage');
            const dots = document.getElementById('carousel-dots');
            if (!stage || !dots) return;
            stage.innerHTML = ''; dots.innerHTML = '';
            
            stage.addEventListener('mouseenter', () => clearInterval(cTimer));
            stage.addEventListener('mouseleave', resetTimer);

            RESUME_DATA.carousel.forEach((item, i) => {
                const card = document.createElement('div');
                card.className = `absolute inset-0 w-full h-full transition-all duration-700 bg-[#050508] flex items-center justify-center overflow-hidden rounded-2xl`;
                card.style.opacity = i === 0 ? '1' : '0'; 
                card.style.zIndex = i === 0 ? '20' : '10';
                
                const isVideo = item.image.toLowerCase().endsWith('.mp4') || item.image.toLowerCase().endsWith('.webm');
                
                if (isVideo) {
                    card.innerHTML = `<video src="${item.image}" class="w-full h-full object-cover" autoplay loop muted playsinline></video>`;
                } else {
                    card.innerHTML = `<img src="${item.image}" class="w-full h-full object-cover">`;
                }
                
                stage.appendChild(card);
                
                const dot = document.createElement('div');
                dot.className = `w-2 h-2 rounded-full cursor-pointer transition-all duration-500 interactive-element hover:bg-white/80 ${i === 0 ? `bg-${item.theme}-400 w-8` : 'bg-white/20'}`;
                dot.onclick = () => { cIdx = i; renderCarousel(); resetTimer(); };
                dots.appendChild(dot);
            });
            renderCarousel(); 
            resetTimer(); 
        }

        function renderCarousel() {
            const data = RESUME_DATA.carousel; const txt = document.getElementById('carousel-text');
            if (!txt) return;
            txt.style.opacity = '0'; txt.style.transform = 'translateY(15px)';
            setTimeout(() => {
                const cur = data[cIdx];
                document.getElementById('c-title').innerText = cur.title;
                document.getElementById('c-desc').innerText = cur.desc;
                document.getElementById('c-link').href = cur.link;
                document.getElementById('c-tags').innerHTML = cur.tags.map(t => `<span class="px-3 py-1 bg-[#111118] border border-white/5 rounded-lg text-${cur.theme}-300 text-xs font-bold">${t}</span>`).join('');
                document.getElementById('c-link').className = `interactive-element group relative inline-flex items-center gap-3 px-8 py-3.5 rounded-xl bg-[#111118] border border-white/5 text-white text-sm font-bold transition-all w-max overflow-hidden hover:scale-[1.03] hover:border-${cur.theme}-400 hover:shadow-[0_0_15px_rgba(var(--tw-colors-${cur.theme}-400),0.2)]`;
                txt.style.opacity = '1'; txt.style.transform = 'translateY(0)';
            }, 300);
            const stageCards = document.getElementById('carousel-stage').children;
            const dots = document.getElementById('carousel-dots').children;
            Array.from(stageCards).forEach((c, i) => { c.style.opacity = i === cIdx ? '1' : '0'; c.style.zIndex = i === cIdx ? '20' : '10'; });
            Array.from(dots).forEach((d, i) => { d.className = i === cIdx ? `w-8 h-2 rounded-full cursor-pointer transition-all duration-500 interactive-element bg-${data[cIdx].theme}-400` : 'w-2 h-2 rounded-full cursor-pointer transition-all duration-500 interactive-element bg-white/20 hover:bg-white/80'; });
        }
        
        function resetTimer() { 
            clearInterval(cTimer); 
            cTimer = setInterval(() => { 
                cIdx = (cIdx + 1) % RESUME_DATA.carousel.length; 
                renderCarousel(); 
            }, 5000); 
        }

        // ==========================================
        // 脑图板块动画 (Neural Skill Network)
        // ==========================================
        function initNetworkAnimation() {
            const canvas = document.getElementById('network-lines');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let w, h, particles = [];
            
            const resize = () => { 
                w = canvas.width = canvas.parentElement.clientWidth; 
                h = canvas.height = canvas.parentElement.clientHeight; 
            };
            window.addEventListener('resize', resize); 
            resize();

            const particleCount = window.innerWidth < 768 ? 35 : 65;
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * w, 
                    y: Math.random() * h,
                    vx: (Math.random() - 0.5) * 0.6, 
                    vy: (Math.random() - 0.5) * 0.6,
                    radius: Math.random() * 2.5 + 1.5
                });
            }

            const render = () => {
                ctx.clearRect(0, 0, w, h);
                ctx.fillStyle = 'rgba(99, 102, 241, 0.8)'; // indigo 粒子颜色
                ctx.strokeStyle = 'rgba(99, 102, 241, 0.15)'; // 连线颜色
                
                for (let i = 0; i < particles.length; i++) {
                    let p = particles[i];
                    p.x += p.vx;
                    p.y += p.vy;

                    // 边界反弹
                    if (p.x < 0 || p.x > w) p.vx *= -1;
                    if (p.y < 0 || p.y > h) p.vy *= -1;

                    // 绘制粒子
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fill();

                    // 绘制连线
                    for (let j = i + 1; j < particles.length; j++) {
                        let p2 = particles[j];
                        let dist = Math.hypot(p.x - p2.x, p.y - p2.y);
                        if (dist < 110) {
                            ctx.beginPath();
                            ctx.moveTo(p.x, p.y);
                            ctx.lineTo(p2.x, p2.y);
                            ctx.lineWidth = 1 - (dist / 110);
                            ctx.stroke();
                        }
                    }
                }
                requestAnimationFrame(render);
            };
            render();
        }

        // ==========================================
        // 初始化辅助逻辑
        // ==========================================
        function initNavbar() {
            const navbar = document.getElementById('navbar');
            window.addEventListener('scroll', () => {
                if (window.scrollY > 30) {
                    navbar.classList.remove('bg-transparent', 'border-transparent', 'py-4');
                    navbar.classList.add('bg-[#050508]/85', 'backdrop-blur-xl', 'border-white/10', 'py-2', 'shadow-xl');
                } else {
                    navbar.classList.add('bg-transparent', 'border-transparent', 'py-4');
                    navbar.classList.remove('bg-[#050508]/85', 'backdrop-blur-xl', 'border-white/10', 'py-2', 'shadow-xl');
                }
            });
        }

        function initStarfield() {
            const canvas = document.getElementById('starfield');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let w, h, particles = [], shootingStars = [];
            const resize = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; };
            window.addEventListener('resize', resize); resize();
            const count = window.innerWidth < 768 ? 60 : 150;
            for (let i = 0; i < count; i++) {
                particles.push({ x: Math.random() * w, y: Math.random() * h, r: Math.random() * 1.5 + 0.3, vx: (Math.random() - 0.5) * 0.1, vy: (Math.random() - 0.8) * 0.1, alpha: Math.random() * 0.6 + 0.2, dir: Math.random() > 0.5 ? 1 : -1 });
            }
            const spawnShootingStar = () => {
                if (Math.random() < 0.03 && shootingStars.length < 2) {
                    shootingStars.push({ x: Math.random() * w + w/2, y: Math.random() * -h/2, len: Math.random() * 80 + 50, speed: Math.random() * 12 + 15, angle: Math.PI / 4 + (Math.random() * 0.1 - 0.05), alpha: 1 });
                }
            };
            const render = () => {
                ctx.clearRect(0, 0, w, h);
                particles.forEach(p => {
                    p.x += p.vx; p.y += p.vy;
                    if (p.x < 0) p.x = w; if (p.x > w) p.x = 0;
                    if (p.y < 0) p.y = h; if (p.y > h) p.y = 0;
                    p.alpha += 0.005 * p.dir;
                    if (p.alpha >= 0.9 || p.alpha <= 0.1) p.dir *= -1;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fillStyle = `rgba(167, 139, 250, ${p.alpha})`; ctx.fill();
                });
                spawnShootingStar();
                shootingStars.forEach((star, i) => {
                    star.x -= Math.cos(star.angle) * star.speed; star.y += Math.sin(star.angle) * star.speed; star.alpha -= 0.015;
                    if (star.alpha <= 0) { shootingStars.splice(i, 1); } else {
                        ctx.beginPath();
                        const gradient = ctx.createLinearGradient(star.x, star.y, star.x + Math.cos(star.angle) * star.len, star.y - Math.sin(star.angle) * star.len);
                        gradient.addColorStop(0, `rgba(255, 255, 255, ${star.alpha})`); gradient.addColorStop(1, `rgba(167, 139, 250, 0)`);
                        ctx.strokeStyle = gradient; ctx.lineWidth = 1.5; ctx.moveTo(star.x, star.y);
                        ctx.lineTo(star.x + Math.cos(star.angle) * star.len, star.y - Math.sin(star.angle) * star.len); ctx.stroke();
                    }
                });
                requestAnimationFrame(render);
            };
            render();
        }

        function initReveal() {
            if (typeof IntersectionObserver === 'undefined') return;
            const observer = new IntersectionObserver((entries, obs) => {
                entries.forEach(entry => { if (entry.isIntersecting) { entry.target.classList.add('active'); obs.unobserve(entry.target); }});
            }, { root: null, rootMargin: '0px', threshold: 0.15 });
            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        }

        function bootApplication() {
            renderPageContent();
            initNavbar();
            initStarfield();    
            initNetworkAnimation(); 
            initZoomPan();
            initCarouselDOM();
            setTimeout(initReveal, 100);
        }

        if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', bootApplication); } 
        else { bootApplication(); }

    </script>
